<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Paradas — Industrializados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
/* HEADER */
.header{background:#111;border-bottom:1px solid #2a2a2a;padding:14px 24px;display:flex;align-items:center;gap:16px}
.header-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.header-sub{font-size:12px;color:#666;margin-left:4px}
.reload-btn{margin-left:auto;background:#c0392b;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .15s}
.reload-btn:hover{background:#e74c3c}
/* TABS */
.tabs{display:flex;gap:6px;padding:14px 24px 0;background:#111;border-bottom:1px solid #222}
.tab{padding:9px 20px;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:700;color:#888;background:#1a1a1a;border:1px solid #2a2a2a;border-bottom:none;letter-spacing:.8px;transition:all .15s}
.tab:hover{color:#ccc}
.tab.active{background:#222;color:#fff;border-color:#333}
/* MONTH FILTERS */
.month-bar{display:flex;gap:6px;padding:12px 24px;background:#1a1a1a;border-bottom:1px solid #222;flex-wrap:wrap;align-items:center}
.month-btn{padding:6px 16px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;color:#888;background:transparent;border:1px solid #333;transition:all .15s;letter-spacing:.3px}
.month-btn:hover{color:#ccc;border-color:#555}
.month-btn.active{background:#c0392b;color:#fff;border-color:#c0392b}
/* KPI BAR */
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#111;border-bottom:1px solid #222}
.kpi{background:#1e1e1e;padding:18px 24px}
.kpi-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:800;color:#fff;line-height:1}
.kpi-sub{font-size:11px;color:#666;margin-top:4px}
/* CHART AREA */
.chart-area{padding:24px}
.chart-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:20px;letter-spacing:.3px}
/* HORIZONTAL BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:0}
.bar-row{display:grid;grid-template-columns:160px 1fr 60px;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #222}
.bar-row:last-child{border-bottom:none}
.bar-label{text-align:right;font-size:11px;color:#aaa;line-height:1.2}
.bar-label .eq-name{font-weight:700;color:#ccc;display:block}
.bar-label .eq-count{color:#666;font-size:10px}
.bar-track{position:relative;height:28px;background:#111;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:#c0392b;border-radius:3px;transition:width .6s ease;position:relative;display:flex;align-items:center;justify-content:flex-end;min-width:4px}
.bar-fill .bar-val{color:#fff;font-size:10px;font-weight:700;padding-right:7px;white-space:nowrap}
.bar-fill.raf-mark{background:linear-gradient(90deg,#c0392b,#ff6b35)}
.bar-minutes{font-size:11px;color:#888;text-align:right;white-space:nowrap}
/* RAF indicator */
.raf-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff6b35;margin-left:4px;vertical-align:middle}
/* LINE FILTER */
.line-filter{padding:8px 24px;display:flex;gap:6px;flex-wrap:wrap;background:#1a1a1a;border-bottom:1px solid #222}
.line-btn{padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;color:#777;background:transparent;border:1px solid #2a2a2a;transition:all .15s}
.line-btn:hover{color:#ccc}
.line-btn.active{background:#333;color:#fff;border-color:#444}
/* Scrollable chart */
.chart-scroll{overflow-y:auto;max-height:calc(100vh - 280px)}
/* RAF section */
.raf-section{margin:0 24px 24px;background:#1e1410;border:1px solid #5a2a1a;border-radius:8px;overflow:hidden}
.raf-header{background:#2a1a0e;padding:10px 16px;font-size:11px;font-weight:700;color:#ff6b35;letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.raf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:#2a2a2a}
.raf-card{background:#1e1e1e;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.raf-eq{font-weight:700;font-size:12px;color:#fff}
.raf-det{font-size:10px;color:#888;margin-top:2px}
.raf-fecha{font-size:10px;color:#666;margin-top:2px}
.raf-min{font-size:20px;font-weight:800;color:#ff6b35}
.raf-min span{font-size:10px;color:#888;font-weight:400}
/* Sort options */
.sort-bar{padding:8px 24px;display:flex;gap:12px;align-items:center;background:#1a1a1a;border-bottom:1px solid #1f1f1f}
.sort-lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.sort-btn{font-size:11px;color:#777;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid #2a2a2a;background:transparent;transition:all .15s}
.sort-btn:hover{color:#ccc}
.sort-btn.active{color:#fff;background:#333;border-color:#444}
/* Update notice */
.update-notice{display:none;position:fixed;bottom:20px;right:20px;background:#22c55e;color:#000;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;animation:slideup .3s ease}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>

  <div>

</div>

<div id="lineFilterEl" class="line-filter" style="display:none"></div>

<div class="sort-bar">

<div class="chart-area">

const MONTHS = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const SHEETS = ['HAMBURGUESAS','SALCHICHAS','REBOZADOS','UNTABLES'];
const SHEET_COLORS = {HAMBURGUESAS:'#c0392b',SALCHICHAS:'#e67e22',REBOZADOS:'#27ae60',UNTABLES:'#8e44ad'};

let currentTab = 'HAMBURGUESAS';
let currentMonths = new Set(['TOTAL']); // TOTAL = all months
let currentLines = new Set(['TODAS']);
let currentSort = 'count';
let liveData = JSON.parse(JSON.stringify(EXCEL_DATA)); // working copy

// ── INIT ────────────────────────────────────────────────────────
function init() {
  buildTabs();
  render();
}

function buildTabs() {
  const el = document.getElementById('tabsEl');
  el.innerHTML = SHEETS.map(s => 
    `<div class="tab ${s===currentTab?'active':''}" onclick="switchTab('${s}')">${s}</div>`
  ).join('');
}

function switchTab(tab) {
  currentTab = tab;
  currentMonths = new Set(['TOTAL']);
  currentLines = new Set(['TODAS']);
  buildTabs();
  render();
}

// ── FILTERS ─────────────────────────────────────────────────────
function getMonthsForTab() {
  const rows = liveData[currentTab] || [];
  const ms = [...new Set(rows.map(r=>r.m).filter(Boolean))];
  return ms.sort((a,b)=>MONTHS.indexOf(a)-MONTHS.indexOf(b));
}

function getLinesForTab() {
  const rows = liveData[currentTab] || [];
  return [...new Set(rows.map(r=>r.l).filter(Boolean))].sort();
}

function buildMonthBar() {
  const months = getMonthsForTab();
  const el = document.getElementById('monthBar');
  const allActive = currentMonths.has('TOTAL');
  let html = `<button class="month-btn ${allActive?'active':''}" onclick="toggleMonth('TOTAL')">Total</button>`;
  months.forEach(m => {
    html += `<button class="month-btn ${!allActive && currentMonths.has(m)?'active':''}" onclick="toggleMonth('${m}')">${m.charAt(0)+m.slice(1).toLowerCase()}</button>`;
  });
  el.innerHTML = html;
}

function toggleMonth(m) {
  if (m === 'TOTAL') {
    currentMonths = new Set(['TOTAL']);
  } else {
    currentMonths.delete('TOTAL');
    if (currentMonths.has(m)) {
      currentMonths.delete(m);
      if (currentMonths.size === 0) currentMonths = new Set(['TOTAL']);
    } else {
      currentMonths.add(m);
    }
  }
  render();
}

function buildLineFilter() {
  const lines = getLinesForTab();
  const el = document.getElementById('lineFilterEl');
  if (lines.length <= 1) { el.style.display='none'; return; }
  el.style.display = 'flex';
  let html = `<span style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-right:4px">Línea:</span>`;
  html += `<button class="line-btn ${currentLines.has('TODAS')?'active':''}" onclick="toggleLine('TODAS')">Todas</button>`;
  lines.forEach(l => {
    html += `<button class="line-btn ${!currentLines.has('TODAS')&&currentLines.has(l)?'active':''}" onclick="toggleLine('${l}')">Línea ${l}</button>`;
  });
  el.innerHTML = html;
}

function toggleLine(l) {
  if (l === 'TODAS') {
    currentLines = new Set(['TODAS']);
  } else {
    currentLines.delete('TODAS');
    if (currentLines.has(l)) {
      currentLines.delete(l);
      if (currentLines.size === 0) currentLines = new Set(['TODAS']);
    } else {
      currentLines.add(l);
    }
  }
  render();
}

function setSort(s) {
  currentSort = s;
  document.getElementById('sortCnt').classList.toggle('active', s==='count');
  document.getElementById('sortMin').classList.toggle('active', s==='minutes');
  renderChart(getFiltered());
}

// ── DATA PROCESSING ─────────────────────────────────────────────
function getFiltered() {
  let rows = liveData[currentTab] || [];
  if (!currentMonths.has('TOTAL')) {
    rows = rows.filter(r => currentMonths.has(r.m));
  }
  if (!currentLines.has('TODAS')) {
    rows = rows.filter(r => currentLines.has(r.l));
  }
  return rows;
}

function aggregateByEquipo(rows) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.e]) map[r.e] = { equipo: r.e, count: 0, minutes: 0, raf: 0 };
    map[r.e].count++;
    map[r.e].minutes += r.t;
    if (r.r) map[r.e].raf++;
  });
  return Object.values(map);
}

// ── KPIs ────────────────────────────────────────────────────────
function renderKPIs(rows) {
  const totalMin = rows.reduce((s,r)=>s+r.t,0);
  const totalCnt = rows.length;
  const rafCnt = rows.filter(r=>r.r).length;
  
  const byEq = aggregateByEquipo(rows);
  const topEq = byEq.sort((a,b)=>b.count-a.count)[0];

  document.getElementById('kpiMin').textContent = Math.round(totalMin).toLocaleString('es-AR');
  document.getElementById('kpiMinSub').textContent = `≈ ${(totalMin/60).toFixed(1)} horas`;
  document.getElementById('kpiCnt').textContent = totalCnt.toLocaleString('es-AR');
  document.getElementById('kpiCntSub').textContent = `${rafCnt > 0 ? rafCnt+' paradas RAF' : 'Sin paradas RAF'}`;
  document.getElementById('kpiEq').textContent = topEq ? topEq.equipo : '—';
  document.getElementById('kpiEqSub').textContent = topEq ? topEq.count+' paradas' : '';

  const periodLabel = currentMonths.has('TOTAL') ? 'Total acumulado' : [...currentMonths].map(m=>m.charAt(0)+m.slice(1).toLowerCase()).join(', ');
  document.getElementById('kpiPer').textContent = periodLabel;
  document.getElementById('kpiPerSub').textContent = currentTab;
}

// ── CHART ────────────────────────────────────────────────────────
// Returns the "family" prefix of an equipment name for grouping
// e.g. "ULMA 1" → "ULMA", "NOVAMAX L1" → "NOVAMAX", "REMACHADORA CFT" → "REMACHADORA"
function equipoFamily(name) {
  // Strip trailing number/letter variants: " 1", " L1", " CFT", " HEMA 2", " IMANTADA", etc.
  return name.replace(/\s+(L?\d+|CFT|HEMA\s*\d*|IMANTADA|GRANEL)$/i, '').trim();
}

function renderChart(rows) {
  const color = SHEET_COLORS[currentTab] || '#c0392b';
  let byEq = aggregateByEquipo(rows);

  // Sort: primary = family name alphabetically, secondary = full name alphabetically
  // This keeps NOVAMAX L1/L2 together, ULMA 1/2/3/4 together, etc.
  // Within each family, sort by the numeric/variant suffix
  byEq.sort((a, b) => {
    const va = currentSort === 'count' ? a.count : a.minutes;
    const vb = currentSort === 'count' ? b.count : b.minutes;
    if (vb !== va) return vb - va;
    return a.equipo.localeCompare(b.equipo);
  });

  const maxVal = currentSort === 'count' ? Math.max(...byEq.map(e=>e.count),1) : Math.max(...byEq.map(e=>e.minutes),1);

  const periodLabel = currentMonths.has('TOTAL') ? 'Total acumulado' : [...currentMonths].map(m=>m.charAt(0)+m.slice(1).toLowerCase()).join(' + ');
  document.getElementById('chartTitle').textContent = `${currentTab} — ${periodLabel}`;

  // Track families to add separator lines between groups
  let lastFamily = null;
  const html = byEq.map((eq, idx) => {
    const val = currentSort === 'count' ? eq.count : eq.minutes;
    const pct = Math.max((val/maxVal)*100, 0.5);
    const minStr = Math.round(eq.minutes).toLocaleString('es-AR')+' min';
    const barLabel = currentSort === 'count' ? eq.count : Math.round(eq.minutes).toLocaleString('es-AR');
    const fam = equipoFamily(eq.equipo);
    const isNewFamily = fam !== lastFamily;
    const familyHasMultiple = byEq.filter(x => equipoFamily(x.equipo) === fam).length > 1;
    const separator = (isNewFamily && idx > 0) ? '<div style="height:8px"></div>' : '';
    const rowBg = (familyHasMultiple) ? 'background:#232323;' : '';
    lastFamily = fam;
    return `${separator}
      <div class="bar-row" style="${rowBg}">
        <div class="bar-label">
          <span class="eq-name">${eq.equipo}${eq.raf>0?'<span class="raf-dot" title="'+eq.raf+' paradas RAF"></span>':''}</span>
          <span class="eq-count">${eq.count} parada${eq.count!==1?'s':''}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color}">
            <span class="bar-val">${barLabel}</span>
          </div>
        </div>
        <div class="bar-minutes">${currentSort==='count'?minStr:''}</div>
      </div>
    `;
  }).join('');

  document.getElementById('barChart').innerHTML = html;
}

// ── RAF SECTION ──────────────────────────────────────────────────
function renderRAF(rows) {
  const rafRows = rows.filter(r=>r.r).sort((a,b)=>b.t-a.t);
  const el = document.getElementById('rafSection');
  if (!rafRows.length) { el.innerHTML=''; return; }
  
  let cards = rafRows.map(r=>`
    <div class="raf-card">
      <div>
        <div class="raf-eq">${r.e}</div>
        <div class="raf-det">${r.d}</div>
        <div class="raf-fecha">${r.f} · ${r.m} · Línea ${r.l}</div>
      </div>
      <div class="raf-min">${Math.round(r.t)}<span> min</span></div>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="raf-section" style="margin:0 24px 24px">
      <div class="raf-header">⚠ PARADAS RAF — ${rafRows.length} evento${rafRows.length!==1?'s':''} mayores a 120 minutos</div>
      <div class="raf-grid">${cards}</div>
    </div>
  `;
}

// ── MAIN RENDER ──────────────────────────────────────────────────
function render() {
  buildMonthBar();
  buildLineFilter();
  const rows = getFiltered();
  renderKPIs(rows);
  renderChart(rows);
  renderRAF(rows);
}

// ── LIVE RELOAD (Electron IPC or file polling) ───────────────────
let isElectron = false;
try {
  const { ipcRenderer } = require('electron');
  isElectron = true;
  ipcRenderer.on('data-updated', (e, data) => {
    liveData = data;
    render();
    showUpdateNotice();
  });
  ipcRenderer.on('data-loaded', (e, { data }) => {
    liveData = data;
    render();
  });
} catch(e) {}

function reloadFromFile() {
  if (isElectron) {
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.send('open-excel');
    } catch(e) {}
  } else {
    // Browser mode: trigger file picker
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xlsm,.xls';
    input.onchange = function(ev) {
      const file = ev.target.files[0];
      if (!file) return;
      document.getElementById('fileStatus').textContent = '⏳ Cargando '+file.name+'...';
      readExcelBrowser(file);
    };
    input.click();
  }
}

function readExcelBrowser(file) {
  // Use SheetJS if available
  if (typeof XLSX === 'undefined') {
    alert('Para cargar un Excel externo, abri esta app desde Electron.\nEsta versión usa los datos embebidos del Excel original.');
    document.getElementById('fileStatus').textContent = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { cellDates: true });
      const sheets = ['HAMBURGUESAS','SALCHICHAS','REBOZADOS','UNTABLES'];
      const result = {};
      sheets.forEach(sn => {
        if (!wb.Sheets[sn]) return;
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header:1, raw:false, dateNF:'yyyy-mm-dd' });
        const rows = [];
        for (let i=2;i<raw.length;i++) {
          const row=raw[i];
          if (!row[0]) continue;
          const t=parseFloat(row[4])||0;
          if (t<=0) continue;
          let fecha=row[0]+'';
          if (fecha.length>10) fecha=fecha.substring(0,10);
          rows.push({f:fecha,e:(row[1]||'').trim(),d:(row[2]||'').trim(),l:(row[3]||'').trim(),t:Math.round(t*10)/10,r:row[7]==='RAF'?1:0,m:(row[8]||'').toUpperCase().trim()});
        }
        result[sn]=rows;
      });
      liveData=result;
      document.getElementById('fileStatus').textContent='✓ '+file.name;
      render();
      showUpdateNotice();
    } catch(err) {
      alert('Error al leer el Excel: '+err.message);
      document.getElementById('fileStatus').textContent='';
    }
  };
  reader.readAsArrayBuffer(file);
}

function showUpdateNotice() {
  const n=document.getElementById('updateNotice');
  n.style.display='block';
  setTimeout(()=>n.style.display='none',3000);
}

// ── START ────────────────────────────────────────────────────────
init();
</script>
